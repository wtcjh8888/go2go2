# Go2 3D 导航系统参数配置

# ── 3D 地图服务器 ──
map_server:
  ros__parameters:
    pcd_path: "/home/w/C206Go2/src/FAST_LIO-ROS2/PCD/scan.pcd"

    # 体素化参数
    voxel_resolution: 0.2         # 体素边长 (m)
    min_points_per_voxel: 1       # 体素内最少点数才算有效
    keypoint_resolution: 0.5      # 关键点降采样间距 (m)

    # 图构建参数
    connection_radius: 0.5        # 关键点最大连接半径 (m)
    max_height_change: 0.2        # 相邻关键点最大允许高差 (m)
    max_slope_angle: 45.0         # 相邻关键点最大允许坡度 (度)

    # 地面高度范围
    # scan.pcd 的当前二楼地面主要在 Z=-0.53m 附近。
    # 不使用 Z 直方图自动检测，否则走廊天花板/墙面密集层会被误判为地面。
    ground_z_min: -0.70           # 当前二楼地面点最低 Z (m)
    ground_z_max: 0.05            # 当前二楼地面点最高 Z (m)
    auto_ground_detect: false     # 固定当前楼层地面范围，避免绿色导航点跑到天花板
    ground_band_width: 0.5        # 地面带宽度 (m)
    floor_detection_mode: "manual" # manual: 使用 ground_z_min/max；odom: 用 base_link_z - robot_base_height 锁定当前楼层；auto: 按点云 Z 分布
    odom_topic: "/Odometry_base_link"
    robot_base_height: 0.30       # Go2 站立时 base_link 约高于地面 30cm
    ground_band_below: 0.35       # 当前楼层地面下方容许厚度 (m)
    ground_band_above: 0.35       # 当前楼层地面上方容许厚度 (m)
    odom_wait_timeout: 5.0        # 等待 /Odometry_base_link 的最长时间 (s)
    auto_calibrate: true          # 自动校准图参数（推荐）
    nav_graph_source: "ground_grid" # ground_grid: 用真实地面点生成高程栅格；free_space: 自由空间模式；ground_points: 旧地面点模式
    free_space_resolution: 0.4    # 自由空间采样间距 (m)
    robot_clearance: 0.0          # 地面栅格调试时先不膨胀障碍；确认地图后再调大
    obstacle_min_height: 0.45     # 高于地面多少开始视为障碍 (m)
    obstacle_max_height: 1.0      # 高于地面多少以内参与障碍投影，避免天花板影响 (m)
    free_space_padding: 0.2       # 地图边界额外留白 (m)
    free_space_bounds_percentile: 1.0 # 去掉少量离群点后估计地图边界
    max_unknown_distance: 1.6     # 候选点离已有点云太远则认为未知，不作为可走区 (m)
    ground_support_radius: 1.0    # 候选点必须靠近真实地面点，避免把回字形中间空洞当成可走区 (m)
    min_component_cells: 80       # 保留所有足够大的可通行连通块，避免只显示回字形走廊的一小段

    # 话题
    nav_graph_topic: "/nav_graph_cloud"
    map_frame: "camera_init"

# ── FAST-LIO body odometry -> robot base_link odometry ──
odometry_to_base_link:
  ros__parameters:
    input_odom_topic: "/Odometry"
    output_odom_topic: "/Odometry_base_link"
    body_frame: "body"
    base_frame: "base_link"
    tf_timeout: 0.2

# ── 3D 路径规划器 ──
path_planner:
  ros__parameters:
    odom_topic: "/Odometry_base_link"
    planner_frequency: 1.0        # 规划频率 (Hz)
    goal_tolerance: 0.3           # 到达目标的 3D 距离容差 (m)
    smooth_iterations: 3          # 路径平滑迭代次数
    graph_interp_points: 5        # 每段边的插值点数

    # 图参数（必须与 map_server 一致）
    connection_radius: 0.5
    max_height_change: 0.2
    max_slope_angle: 45.0

# ── 3D 避障模块 ──
obstacle_avoider:
  ros__parameters:
    cloud_topic: "/cloud_registered_body"
    odom_topic: "/Odometry_base_link"
    detection_range: 3.0          # 检测范围 (m)
    danger_distance: 0.3          # 危险距离 (m)
    warning_distance: 0.8         # 警告距离 (m)
    fov_angle: 120.0              # 前方检测角度 (度)
    max_linear_speed: 0.15        # 小幅测试最大线速度 (m/s)
    max_angular_speed: 0.4        # 小幅测试最大角速度 (rad/s)

    # 3D 高度过滤
    height_band: 0.5              # 高度带上限（相对机器人 Z）(m)
    ground_clearance: 0.05        # 地面间隙（忽略机器人以下的点）(m)
    slope_threshold: 30.0         # 坡道判定阈值 (度)

    input_cmd_vel_topic: "/cmd_vel_raw"
    output_cmd_vel_topic: "/cmd_vel"

# ── 3D 运动控制器 ──
motion_controller:
  ros__parameters:
    look_ahead_distance: 0.5      # 前视距离 (m)
    control_frequency: 10.0       # 控制频率 (Hz)
    max_linear_speed: 0.15        # 小幅测试最大线速度 (m/s)
    max_angular_speed: 0.4        # 小幅测试最大角速度 (rad/s)
    min_linear_speed: 0.05        # Go2 能实际响应的最小前进速度 (m/s)
    min_angular_speed: 0.12       # Go2 能实际响应的最小转向速度 (rad/s)
    max_acceleration: 0.3         # 最大加速度 (m/s²)
    goal_tolerance: 0.2           # 到达目标 3D 距离容差 (m)

    # 坡度调速
    max_slope_angle: 30.0         # 坡度减速上限 (度)
    slope_speed_factor: 0.0       # 平面导航时关闭坡度减速，Z 只用于从 3D 地图提取可通行区域

    odom_topic: "/Odometry_base_link"
    cmd_vel_topic: "/cmd_vel_raw"

# ── WebRTC Bridge（不变）──
webrtc_bridge:
  ros__parameters:
    robot_ip: "192.168.12.1"
    aes_key: "7b7ad05fae7b79f3c0135f7417f895d0"
    cmd_vel_topic: "/cmd_vel"
    max_linear_vel: 0.15
    max_angular_vel: 0.4

# ── 导航主节点（一体化模式，暂不改动）──
navigation_node:
  ros__parameters:
    odom_topic: "/Odometry_base_link"
    goal_topic: "/goal_pose"
    cloud_topic: "/cloud_registered_body"
    replan_distance: 1.0
    replan_interval: 5.0
    goal_tolerance: 0.2
    planner_frequency: 2.0
    smooth_iterations: 3
    look_ahead_distance: 0.5
    max_linear_speed: 0.5
    max_angular_speed: 1.0
    max_acceleration: 0.5
    control_frequency: 10.0
    detection_range: 3.0
    danger_distance: 0.3
    warning_distance: 0.8
    fov_angle: 120.0
