/**:
    ros__parameters:
        feature_extract_enable: false       # 是否启用特征提取
        point_filter_num: 4                 # 点云降采样步长，每 N 个点取 1 个
        max_iteration: 3                    # 最大迭代次数
        filter_size_surf: 0.5               # 平面特征体素滤波尺寸（米）
        filter_size_map: 0.5                # 地图点云体素滤波尺寸（米）
        cube_side_length: 1000.0            # 地图保留范围（米），超出该立方体的点将被移除
        runtime_pos_log_enable: false       # 是否在运行时输出位姿日志
        map_file_path: "/home/w/C206Go2/src/PCD"  # PCD 地图保存路径

        common:
            lid_topic:  "/livox/lidar"      # 雷达点云话题
            imu_topic:  "/livox/imu"        # IMU 数据话题
            time_sync_en: false             # 时间同步开关，仅在无法进行外部时间同步时才开启
            time_offset_lidar_to_imu: 0.0   # 雷达与 IMU 之间的时间偏移（由外部标定工具如 LI-Init 得出）
                                            # 无论 time_sync_en 是否开启均生效，不确定时请设为 0.0

        preprocess:
            lidar_type: 1                   # 雷达类型：1=Livox, 2=Velodyne, 3=Ouster, 4=其他
            scan_line:  4                   # 雷达线数
            blind: 0.5                      # 盲区距离（米），低于此距离的点将被过滤
            timestamp_unit: 3               # 时间戳单位：1=秒, 2=微秒, 3=纳秒
            scan_rate: 10                   # 扫描频率（Hz）

        mapping:
            acc_cov: 0.1                    # 加速度计噪声协方差
            gyr_cov: 0.1                    # 陀螺仪噪声协方差
            b_acc_cov: 0.0001               # 加速度计随机游走协方差
            b_gyr_cov: 0.0001               # 陀螺仪随机游走协方差
            fov_degree:    360.0            # 雷达视场角（度）
            det_range:     100.0            # 雷达最大探测距离（米）
            extrinsic_est_en:  false        # 是否在线估计外参
            extrinsic_T: [ -0.011, -0.02329, 0.04412 ]  # 雷达到 IMU 的外参平移
            extrinsic_R: [ 1., 0., 0.,                  # 雷达到 IMU 的外参旋转（3x3 行优先）
                            0., 1., 0.,
                            0., 0., 1.]

        publish:
            path_en: true                   # 是否发布轨迹路径（/path 话题）
            effect_map_en: false            # 是否发布特征点云（/cloud_effected 话题）
            map_en: true                    # 是否发布全局地图点云（/Laser_map 话题）
            scan_publish_en:  true          # 是否发布当前帧点云，关闭后所有点云输出均停止
            dense_publish_en: false         # 是否稠密发布全局坐标系点云，关闭可降低点数
            scan_bodyframe_pub_en: true     # 是否发布 IMU 坐标系下的当前帧点云

        pcd_save:
            pcd_save_en: true               # 是否保存 PCD 文件
            interval: -1                    # 每隔多少帧保存一次；-1 表示所有帧保存到同一个文件（帧数过多可能导致内存溢出）